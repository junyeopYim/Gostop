<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <!-- 광 전용 프레임: 덱 공통 붉은 외곽 + 뚜렷한 금 띠·모서리 매듭·상단 문양.
       인게임 축소(150x225)에서도 일반 패와 한눈에 구별되는 것이 목표.
       테두리 외 영역은 완전 투명 — 베이스 프레임이자 런타임 개조 오버레이로 이중 운용 -->
  <rect x="6" y="6" width="288" height="438" rx="12" fill="none" stroke="var(--borderRed)" stroke-width="11" />
  <!-- 금 띠 -->
  <rect x="18" y="18" width="264" height="414" rx="7" fill="none" stroke="var(--gold)" stroke-width="5" />
  <!-- 네 모서리 금 장식: 띠 모서리를 감싸는 굵은 매듭 -->
  <g fill="none" stroke="var(--gold)" stroke-width="10" stroke-linecap="round">
    <path d="M 18 34 V 25 Q 18 18 25 18 H 34" />
    <path d="M 266 18 H 275 Q 282 18 282 25 V 34" />
    <path d="M 282 416 V 425 Q 282 432 275 432 H 266" />
    <path d="M 34 432 H 25 Q 18 432 18 425 V 416" />
  </g>
  <!-- 상단 중앙 금 문양: 해 원반 -->
  <circle cx="150" cy="18" r="11" fill="var(--gold)" />
  <circle cx="150" cy="18" r="4" fill="var(--borderRed)" />
</svg>
