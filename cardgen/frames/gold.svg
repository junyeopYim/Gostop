<svg viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
  <!-- 광 베이스 프레임: 한지(담채) 바탕 위 금색 이중선 테두리.
       테두리 외 영역은 완전 투명 — 베이스 프레임이자 런타임 개조 오버레이로 이중 운용 -->
  <rect x="7" y="7" width="286" height="436" rx="12" fill="none" stroke="var(--gold)" stroke-width="5" />
  <rect x="16" y="16" width="268" height="418" rx="8" fill="none" stroke="var(--gold)" stroke-width="1.5" />
  <!-- 네 모서리 금 장식: 안쪽 선과 이어지는 짧은 능선 + 점 -->
  <g stroke="var(--gold)" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 16 44 V 24 Q 16 16 24 16 H 44" />
    <path d="M 256 16 H 276 Q 284 16 284 24 V 44" />
    <path d="M 284 406 V 426 Q 284 434 276 434 H 256" />
    <path d="M 44 434 H 24 Q 16 434 16 426 V 406" />
  </g>
  <g fill="var(--gold)">
    <circle cx="27" cy="27" r="2.5" />
    <circle cx="273" cy="27" r="2.5" />
    <circle cx="27" cy="423" r="2.5" />
    <circle cx="273" cy="423" r="2.5" />
    <!-- 상하 중앙 금점 -->
    <circle cx="150" cy="11.5" r="2" />
    <circle cx="150" cy="438.5" r="2" />
  </g>
</svg>
