  <circle cx="134" cy="128" r="82" fill="var(--paper)" />
  <circle cx="134" cy="128" r="82" fill="none" stroke="var(--gold)" stroke-width="5" />
  <circle cx="110" cy="110" r="10" fill="var(--gold)" opacity="0.5" />
  <circle cx="158" cy="150" r="6" fill="var(--gold)" opacity="0.5" />
